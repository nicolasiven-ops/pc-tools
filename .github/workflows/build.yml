name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r lol-autopick/requirements.txt

      - name: Build PC Tools
        run: pyinstaller --onefile --noconsole --icon pc-tools.ico --name PC-Tools pc_tools.py

      # --onedir (not --onefile) avoids the self-extracting stub that Windows
      # Defender most often flags; --noupx and embedded version metadata cut the
      # false-positive rate further. The folder is shipped as a .zip.
      - name: Build LoL Auto-Pick
        run: pyinstaller --onedir --noconsole --noupx --icon lol-autopick/lol-autopick.ico --version-file lol-autopick/version_info.txt --name LoL-AutoPick --paths lol-autopick lol-autopick/app.py

      - name: Zip LoL Auto-Pick
        shell: pwsh
        run: Compress-Archive -Path dist/LoL-AutoPick -DestinationPath dist/LoL-AutoPick.zip -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables
          path: |
            dist/PC-Tools.exe
            dist/LoL-AutoPick.zip

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Neueste Version
          files: |
            dist/PC-Tools.exe
            dist/LoL-AutoPick.zip
