name: Build EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r lol-autopick/requirements.txt

      - name: Build PC Tools
        run: pyinstaller --onefile --noconsole --name PC-Tools pc_tools.py

      - name: Build LoL Auto-Pick
        run: pyinstaller --onefile --noconsole --name LoL-AutoPick --paths lol-autopick lol-autopick/app.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: executables
          path: |
            dist/PC-Tools.exe
            dist/LoL-AutoPick.exe

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Neueste Version
          files: |
            dist/PC-Tools.exe
            dist/LoL-AutoPick.exe
